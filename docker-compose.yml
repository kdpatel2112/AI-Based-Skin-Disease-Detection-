version: "3.9"

services:
  backend:
    build: ./backend
    container_name: skin-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: skin-ai-redis
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    container_name: skin-ai-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

# NOTE: MongoDB is expected to be MongoDB Atlas (cloud) per the spec, configured
# via MONGODB_URI in .env. To run Mongo locally instead, add a "mongo" service
# here using the official mongo image and point MONGODB_URI at it.
